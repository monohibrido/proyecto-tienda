<div class="container mt-4">

    <div class="container mt-4">

        <button class="btn btn-success me-2" (click)="mostrarFormulario = true">
            Agregar Producto
        </button>

        <button class="btn btn-secondary" disabled>
            Agregar Categoría (próximamente)
        </button>

    </div>

    @if(mostrarFormulario){
    <app-form-add-product [producto]="nuevoProducto" [editando]="editando" (guardar)="crearProducto()"
        (cancelar)="cancelarEdicion()"></app-form-add-product>
    }



</div>

<div class="container mt-4">
    <h2>Productos</h2>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>SKU</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th>Precio</th>
                <th>Costo</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            @for (p of productos; track p.id) {
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.sku }}</td>
                <td>{{ p.nombre }}</td>
                <td>{{ p.categoria }}</td>
                <td>{{ p.precio }}</td>
                <td>{{ p.costo }}</td>
                <td>{{ p.stock }}</td>
                <td>
                    <button class="btn btn-warning btn-sm me-2" (click)="editarProducto(p)"
                        (click)="mostrarFormulario = true">
                        Editar
                    </button>
                    <button class="btn btn-danger btn-sm" (click)="eliminarProducto(p.id!)">
                        Eliminar
                    </button>
                </td>
            </tr>

            }@empty {
            <tr>
                <td colspan="3"> No hay productos</td>
            </tr>
            }

        </tbody>
    </table>
</div>
